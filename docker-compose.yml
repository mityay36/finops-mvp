version: '3.9'

services:
  api:
    build:
      context: ./api
      # ARM Mac: образ собирается нативно для local dev
      # Для деплоя в кластер используй: docker buildx build --platform linux/amd64
    ports:
      - "8000:8000"
    environment:
      - OPENCOST_URL=http://host.docker.internal:9003  # port-forward opencost
      - VM_URL=http://host.docker.internal:8428        # port-forward victoria-metrics
      - YC_ACCESS_KEY=${YC_ACCESS_KEY:-}
      - YC_SECRET_KEY=${YC_SECRET_KEY:-}
      - YC_BUCKET=${YC_BUCKET:-finops-billing}
    volumes:
      - ./api/app:/app/app:ro  # hot-reload для разработки
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api
