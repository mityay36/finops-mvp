name: Build & Deploy to YC

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'frontend/**'
      - 'k8s/**'

env:
  REGISTRY: cr.yandex
  API_IMAGE: cr.yandex/${{ secrets.YCR_REGISTRY_ID }}/finops-api
  FRONTEND_IMAGE: cr.yandex/${{ secrets.YCR_REGISTRY_ID }}/finops-frontend

jobs:
  build-push:
    name: Build & Push images
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Login to Yandex Container Registry
        run: |
          echo '${{ secrets.YCR_SA_KEY }}' | docker login             --username json_key             --password-stdin             cr.yandex

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # API
      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: ./api
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ steps.meta.outputs.sha }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # FRONTEND
      - name: Build & push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifests:
    name: Update K8s image tags
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Patch image tags in manifests
        run: |
          SHA=${{ needs.build-push.outputs.sha }}
          REGISTRY_ID=${{ secrets.YCR_REGISTRY_ID }}

          sed -i "s|cr.yandex/.*/finops-api:.*|cr.yandex/${REGISTRY_ID}/finops-api:${SHA}|g"             k8s/api/deployment.yaml

          sed -i "s|cr.yandex/.*/finops-frontend:.*|cr.yandex/${REGISTRY_ID}/finops-frontend:${SHA}|g"             k8s/frontend/deployment.yaml

      - name: Commit & push updated manifests
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/api/deployment.yaml k8s/frontend/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update images to ${{ needs.build-push.outputs.sha }} [skip ci]"
          git push
