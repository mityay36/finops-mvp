name: CD — Application (FastAPI)

on:
  push:
    branches: [main]
    paths:
      - "api/**"

env:
  REGISTRY: cr.yandex
  IMAGE_NAME: ${{ secrets.YCR_REGISTRY_ID }}/finops-api

jobs:
  build-and-deploy:
    name: Build → Push → Update manifest
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          # Нужен полный fetch для коммита обратно в репо
          token: ${{ secrets.GH_PAT }}

      # ── 1. Build Docker image ───────────────────────────────────────────────
      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "full_image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}"

      - name: Build Docker image
        run: |
          docker build \
            --tag "${{ steps.tag.outputs.full_image }}" \
            --tag "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            ./api

      # ── 2. Push в Yandex Container Registry ────────────────────────────────
      - name: Login to Yandex Container Registry
        run: |
          echo "${{ secrets.YCR_SA_KEY }}" | docker login cr.yandex \
            --username json_key \
            --password-stdin

      - name: Push image
        run: |
          docker push "${{ steps.tag.outputs.full_image }}"
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "✅ Pushed: ${{ steps.tag.outputs.full_image }}"

      # ── 3. Обновляем image tag в манифесте (GitOps) ─────────────────────────
      - name: Update image tag in manifest
        run: |
          # Обновляем тег в k8s/api/deployment.yaml
          sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:.*|image: ${{ steps.tag.outputs.full_image }}|g" \
            k8s/api/deployment.yaml

          cat k8s/api/deployment.yaml | grep "image:"
          echo "✅ Updated image tag to ${{ steps.tag.outputs.tag }}"

      # ── 4. Коммитим обновлённый манифест → ArgoCD auto-syncs ────────────────
      - name: Commit updated manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/api/deployment.yaml

          # Только если есть изменения
          git diff --staged --quiet && echo "No changes to commit" && exit 0

          git commit -m "chore(deploy): update finops-api image to ${{ steps.tag.outputs.tag }} [skip ci]"
          git push

      # ── 5. ArgoCD sync финального состояния ─────────────────────────────────
      - name: Configure kubectl & ArgoCD
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_YC }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

          VERSION=$(curl -s https://api.github.com/repos/argoproj/argo-cd/releases/latest | jq -r .tag_name)
          curl -sSL -o /usr/local/bin/argocd \
            "https://github.com/argoproj/argo-cd/releases/download/${VERSION}/argocd-linux-amd64"
          chmod +x /usr/local/bin/argocd

          kubectl port-forward svc/argocd-server -n argocd 8080:443 &
          sleep 5
          argocd login localhost:8080 --insecure \
            --username admin --password "${{ secrets.ARGOCD_PASSWORD }}"

      - name: Sync & wait for finops-api
        run: |
          argocd app sync finops-api --timeout 60 || true
          argocd app wait finops-api --health --timeout 300
          echo "✅ finops-api deployed: ${{ steps.tag.outputs.full_image }}"

      # ── 6. Summary ──────────────────────────────────────────────────────────
      - name: Deployment Summary
        if: always()
        run: |
          echo "## 🐳 Application Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ steps.tag.outputs.full_image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Author | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
