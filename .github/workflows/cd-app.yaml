name: CD — Build & Deploy App

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "frontend/**"

env:
  REGISTRY: cr.yandex
  API_IMAGE: cr.yandex/${{ secrets.YCR_REGISTRY_ID }}/finops-api
  FRONTEND_IMAGE: cr.yandex/${{ secrets.YCR_REGISTRY_ID }}/finops-frontend

jobs:
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      # ── Buildx для ARM-совместимых образов ──────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Login to Yandex Container Registry
        run: |
          echo '${{ secrets.YCR_SA_KEY }}' | docker login cr.yandex \
            --username json_key --password-stdin

      - name: Set image tag
        id: tag
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      # ── Build API (linux/amd64 для кластера YC) ────────────────────────────
      - name: Build & Push API
        if: contains(join(steps.*.outputs.*, ' '), 'api') || github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: ./api
          platforms: linux/amd64        # YC ноды — AMD64
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ steps.tag.outputs.sha }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build Frontend ─────────────────────────────────────────────────────
      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Обновляем image tags в манифестах (GitOps trigger) ─────────────────
      - name: Update image tags in manifests
        run: |
          SHA=${{ steps.tag.outputs.sha }}
          sed -i "s|finops-api:.*|finops-api:${SHA}|g" k8s/api/deployment.yaml
          sed -i "s|finops-frontend:.*|finops-frontend:${SHA}|g" k8s/frontend/deployment.yaml

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/api/deployment.yaml k8s/frontend/deployment.yaml
          git diff --staged --quiet || git commit -m "chore(deploy): bump images to ${SHA} [skip ci]"
          git push

  health-check:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: build-push
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_YC }}" | base64 -d > ~/.kube/config

      - name: Install ArgoCD CLI
        run: |
          VERSION=$(curl -s https://api.github.com/repos/argoproj/argo-cd/releases/latest | jq -r .tag_name)
          curl -sSL -o /usr/local/bin/argocd \
            "https://github.com/argoproj/argo-cd/releases/download/${VERSION}/argocd-linux-amd64"
          chmod +x /usr/local/bin/argocd
          kubectl port-forward svc/argocd-server -n argocd 8080:443 &
          sleep 5
          argocd login localhost:8080 --insecure \
            --username admin --password "${{ secrets.ARGOCD_PASSWORD }}"

      - name: Sync & wait finops-app
        run: |
          argocd app sync finops-app --timeout 60 || true
          argocd app wait finops-app --health --timeout 300
          echo "✅ finops-app deployed"
