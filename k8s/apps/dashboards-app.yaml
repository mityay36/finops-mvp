apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-dashboards
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mityay36/finops-mvp
    targetRevision: main
    path: k8s/dashboards

  destination:
    server: https://kubernetes.default.svc
    namespace: vmks

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
