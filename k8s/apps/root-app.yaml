apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: finops-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_USERNAME/finops-mvp
    targetRevision: main
    path: apps
    directory:
      recurse: false
      exclude: root-app.yaml   # не применять себя рекурсивно
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
