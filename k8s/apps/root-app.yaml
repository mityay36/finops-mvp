---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: finops-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/mityay36/finops-mvp
    targetRevision: main
    path: k8s/apps
    directory:
      recurse: false
      exclude: root-app.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
