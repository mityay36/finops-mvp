apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: finops-manifests
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_USERNAME/finops-mvp
    targetRevision: main
    path: manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: opencost

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
